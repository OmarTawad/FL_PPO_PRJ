experiment:
  name: "exp07_qat_int8_val"
  rounds: 3
  seed: 42
  dropout_mode: "docker"

clients:
  count: 10
  profiles:
    - {id: 0, profile: "strong", mem_limit_mb: 2560, cpu_cores: 1.0, data_fraction: 0.0}
    - {id: 1, profile: "strong", mem_limit_mb: 2560, cpu_cores: 1.0, data_fraction: 0.0}
    - {id: 2, profile: "medium", mem_limit_mb: 1536, cpu_cores: 0.75, data_fraction: 0.0}
    - {id: 3, profile: "medium", mem_limit_mb: 1536, cpu_cores: 0.75, data_fraction: 0.0}
    - {id: 4, profile: "medium", mem_limit_mb: 1536, cpu_cores: 0.75, data_fraction: 0.0}
    - {id: 5, profile: "medium", mem_limit_mb: 1536, cpu_cores: 0.75, data_fraction: 0.0}
    - {id: 6, profile: "weak", mem_limit_mb: 1024, cpu_cores: 0.5, data_fraction: 0.0}
    - {id: 7, profile: "weak", mem_limit_mb: 1024, cpu_cores: 0.5, data_fraction: 0.0}
    - {id: 8, profile: "weak", mem_limit_mb: 1024, cpu_cores: 0.5, data_fraction: 0.0}
    - {id: 9, profile: "extreme_weak", mem_limit_mb: 768, cpu_cores: 0.25, data_fraction: 0.0}

data:
  dataset: "cifar10"
  partition: "iid"
  dirichlet_alpha: 0.1
  reduced_fraction: 0.2
  use_32: false
  eval_fraction: 0.10
  max_eval_samples_per_client: 0

quantization:
  mode: "mixed"
  fixed_bits: 32
  lowp_dtype: "bf16"
  int8_impl: "qat"
  int8_backend: "auto"
  calibration_samples: 128
  qat_scope: "classifier_only"
  qat_convert_after_fit: true
  qat_eval_batches_for_convert_check: 1
  qat_convert_probe_client_id: 6
  qat_convert_probe_round: 1
  per_client:
    0: 32
    1: 32
    2: 32
    3: 32
    4: 32
    5: 32
    6: 8
    7: 8
    8: 8
    9: 8

fl:
  local_epochs: 2
  batch_size: 8
  per_profile_batch:
    strong: 8
    medium: 8
    weak: 8
    extreme_weak: 8
  num_workers: 0
  pin_memory: false
  optimizer: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  freeze_features: false
  min_clients_per_round: 6
  aggregate_bn_buffers: false

rl:
  algorithm: "ppo"
  total_timesteps: 50
  n_steps: 1

logging:
  level: "info"
  metrics_dir: "outputs/exp07_qat_int8/metrics"
  plots_dir: "outputs/exp07_qat_int8/plots"
