  partition: iid
  dirichlet_alpha: 0.1
  reduced_fraction: 1.0
  use_32: false
  eval_fraction: 0.1
  max_eval_samples_per_client: 0
quantization:
  mode: fixed_fp32
  fixed_bits: 32
  calibration_samples: 128
fl:
  local_epochs: 2
  batch_size: 8
  per_profile_batch:
    medium: 8
    medium_low: 8
    weak: 8
    extreme_weak: 8
    ultra_extreme: 8
  num_workers: 0
  pin_memory: false
  optimizer: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  freeze_features: false
  min_clients_per_round: 1
  aggregate_bn_buffers: false
rl:
  algorithm: ppo
  total_timesteps: 50
  n_steps: 1
logging:
  level: info
  metrics_dir: outputs/exp05_extreme_memory_limits/metrics
  plots_dir: outputs/exp05_extreme_memory_limits/plots
