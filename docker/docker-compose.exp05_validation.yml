name: fl_ppo_exp05_val
services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server_exp05val
    hostname: server
    environment:
      CONFIG_PATH: experiments/exp05_extreme_memory_limits/config_validation.yaml
      PARTITION_FILE: /data/partitions_20_iid_extreme_memory_exp05.json
      DATA_ROOT: /data
      SERVER_PORT: '8080'
      OUTPUTS_DIR: /outputs/exp05_extreme_memory_limits
      NUM_ROUNDS: '1'
      OMP_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
    ports:
    - 8080:8080
    volumes:
    - ../data:/data:ro
    - ../outputs:/outputs
    - ../experiments:/app/experiments:ro
    networks:
    - fl_exp05val_net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3072m
    healthcheck:
      test:
      - CMD-SHELL
      - echo healthy
      interval: 5s
      timeout: 3s
      retries: 10
  client_00:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00_exp05val
    environment:
      CLIENT_ID: '0'
      SERVER_ADDR: server:8080
      CONFIG_PATH: experiments/exp05_extreme_memory_limits/config_validation.yaml
      PARTITION_FILE: /data/partitions_20_iid_extreme_memory_exp05.json
      DATA_ROOT: /data
      OMP_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
    volumes:
    - ../data:/data:ro
    - ../experiments:/app/experiments:ro
    networks:
    - fl_exp05val_net
    depends_on:
    - server
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1024m
    restart: 'no'
  client_01:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
