name: fl_ppo_exp08
services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server_exp08
    hostname: server
    environment:
      CONFIG_PATH: experiments/exp08_pruning_weak10/config.yaml
      PARTITION_FILE: /data/partitions_10_iid_pruning_exp08.json
      DATA_ROOT: /data
      SERVER_PORT: '8080'
      OUTPUTS_DIR: /outputs/exp08_pruning_weak10
      NUM_ROUNDS: '50'
      OMP_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
    ports:
    - 8080:8080
    volumes:
    - ../data:/data:ro
    - ../outputs:/outputs
    - ../experiments:/app/experiments:ro
    networks:
    - fl_exp08_net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3072m
    healthcheck:
      test:
      - CMD-SHELL
      - echo healthy
      interval: 5s
      timeout: 3s
      retries: 10
  client_00:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00_exp08
    environment:
      CLIENT_ID: '0'
      SERVER_ADDR: server:8080
      CONFIG_PATH: experiments/exp08_pruning_weak10/config.yaml
      PARTITION_FILE: /data/partitions_10_iid_pruning_exp08.json
      DATA_ROOT: /data
      OMP_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
    volumes:
    - ../data:/data:ro
    - ../experiments:/app/experiments:ro
    networks:
    - fl_exp08_net
    depends_on:
    - server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2560m
    restart: 'no'
  client_01:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
