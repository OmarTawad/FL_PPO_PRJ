# docker-compose.grpc_50rounds.yml
# Docker gRPC 50-round validation: 1 server + 3 clients, 50 rounds, fixed FP32
#
# Run:
#   docker compose -f docker-compose.grpc_50rounds.yml up --build --abort-on-container-exit
#
# Expected outputs:
#   outputs/metrics/run_<id>/round_001.json … round_050.json
#   outputs/metrics/run_<id>/summary.json
#   outputs/plots/run_<id>/*.png (5 plots)

name: fl_ppo_grpc_50rounds

x-base-build: &base-build
  context: .
  dockerfile: docker/Dockerfile.base

services:

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server_grpc50
    hostname: server
    environment:
      CONFIG_PATH: configs/exp_docker_grpc_50rounds.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
      SERVER_PORT: "8080"
      OUTPUTS_DIR: /outputs
      NUM_ROUNDS: "50"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
      - ./outputs:/outputs
      - ./configs:/app/configs:ro
    networks:
      - fl_grpc50_net
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: "12288m"
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: "5s"
      timeout: "3s"
      retries: 10

  client_00:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00_grpc50
    environment:
      CLIENT_ID: "0"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_grpc_50rounds.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_grpc50_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2048m"
    restart: "no"

  client_01:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_01_grpc50
    environment:
      CLIENT_ID: "1"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_grpc_50rounds.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_grpc50_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2048m"
    restart: "no"

  client_02:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_02_grpc50
    environment:
      CLIENT_ID: "2"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_grpc_50rounds.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_grpc50_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2048m"
    restart: "no"

networks:
  fl_grpc50_net:
    driver: bridge
