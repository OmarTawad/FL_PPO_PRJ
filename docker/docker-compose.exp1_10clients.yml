name: fl_ppo_exp1_10clients
services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server_exp1_10
    hostname: server
    environment:
      CONFIG_PATH: configs/exp1_homogeneous_iid_10clients.yaml
      PARTITION_FILE: /data/partitions_10_iid_homogeneous.json
      DATA_ROOT: /data
      SERVER_PORT: '8080'
      OUTPUTS_DIR: /outputs
      NUM_ROUNDS: '50'
    ports:
    - 8080:8080
    volumes:
    - ./data:/data:ro
    - ./outputs:/outputs
    - ./configs:/app/configs:ro
    networks:
    - fl_exp1_net
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 12288m
  client_00:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00_exp1_10
    environment:
      CLIENT_ID: '0'
      SERVER_ADDR: server:8080
      CONFIG_PATH: configs/exp1_homogeneous_iid_10clients.yaml
      PARTITION_FILE: /data/partitions_10_iid_homogeneous.json
      DATA_ROOT: /data
    volumes:
    - ./data:/data:ro
    - ./configs:/app/configs:ro
    networks:
    - fl_exp1_net
    depends_on:
    - server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048m
    restart: 'no'
  client_01:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
