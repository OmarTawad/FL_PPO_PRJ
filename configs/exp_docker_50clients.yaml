data:
  dataset: "cifar10"
  partition: "iid"           # switch to "dirichlet" for non-IID experiment
  dirichlet_alpha: 0.1       # used only if partition=dirichlet
  reduced_fraction: 1.0      # full dataset (50,000 / 50 = 1,000 samples/client)
  eval_fraction: 0.02        # 2% of test set per client
  max_eval_samples_per_client: 200

quantization:
  mode: "adaptive"           # PPO-controlled per-client; switch to fixed_fp32 for baselines
  fixed_bits: 32             # fallback for fixed_* modes
  calibration_samples: 128   # paper-aligned: 128 samples for INT8 calibration

fl:
  local_epochs: 2            # paper: 2 epochs per round for convergence
  batch_size: 32             # default; profile overrides used
  per_profile_batch:
    strong: 32
    medium: 16
    weak: 8
    extreme_weak: 8
  num_workers: 0             # VM-safe
  pin_memory: false
  optimizer: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  min_clients_per_round: 1   # adaptive mode may select any subset

rl:
  algorithm: "ppo"
  total_timesteps: 50        # = number of FL rounds
  n_steps: 1                 # PPO updates every FL round
  batch_size: 1
  gamma_discount: 0.99
  reward_alpha: 1.0          # paper: α=1.0
  reward_beta: 0.5           # paper: β=0.5
  reward_gamma_var: 0.1      # paper: γ=0.1
  policy: "MlpPolicy"
  checkpoint_dir: "outputs/checkpoints"
  learning_rate: 0.0003

logging:
  level: "info"
  metrics_dir: "outputs/metrics"
  plots_dir: "outputs/plots"
