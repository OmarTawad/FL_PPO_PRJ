# configs/exp_docker_50clients.yaml
# Full 50-client Docker experiment: 50 rounds, heterogeneous clients, IID, adaptive PPO.
# Paper-aligned: matches Table 2 (Exp10 / PPO adaptive) in the paper.
#
# WARNING: This config declares 50 clients.
# DO NOT use this directly with docker-compose.yml on a 22 GB host
# without first running the smoke test successfully.
#
# Resource distribution matches docker-compose.yml:
#   IDs 0-9   = strong    (2.0 CPU, 2048 MB)
#   IDs 10-29 = medium    (1.0 CPU, 1024 MB)
#   IDs 30-44 = weak      (0.5 CPU,  512 MB)
#   IDs 45-49 = extreme_weak (0.25 CPU, 256 MB)
#
# Paper alignment:
#   - state_dim = 50*7+3 = 353
#   - action_space = MultiDiscrete([4]*50)  (4^50 joint actions, ~2^100)
#   - reward = alpha*dAcc - beta*dropout - gamma*Var(Q) [selected clients only]
#   - quantization fallback: static_int8 -> fp16 -> fp32
#   - CIFAR-10, MobileNetV2, 224x224

experiment:
  name: "exp_docker_50clients"
  rounds: 50
  seed: 42
  dropout_mode: "stochastic"

clients:
  count: 50
  profiles:
    # Strong clients (IDs 0-9): 2.0 CPUs, 2048 MB
    - {id:  0, profile: "strong",       mem_limit_mb: 2048, cpu_cores: 2.0, data_fraction: 0.0}
