# configs/exp_docker_grpc_50rounds.yaml
# Docker gRPC 50-round validation — 3 clients, reduced data, fixed FP32.
# Purpose: Prove gRPC transport + 50 complete rounds.
#
# This config is for the docker-compose.grpc_50rounds.yml test.
# Matches paper round count (50) but uses 3 clients + small data for safety.
#
# Paper alignment:
#   - 50 rounds (paper §5: "Rounds: 50")
#   - CIFAR-10, MobileNetV2, 224x224 (hardguard in client.py)
#   - IID, stochastic dropout, fixed FP32 (baseline)
#   - All 8 per-round JSON fields logged (SPEC §8)

experiment:
  name: "exp_docker_grpc_50rounds"
  rounds: 50
  seed: 42
  dropout_mode: "stochastic"

clients:
  count: 3
  profiles:
    - id: 0
      profile: "strong"
      mem_limit_mb: 2048
      cpu_cores: 2.0
      data_fraction: 0.0
    - id: 1
      profile: "medium"
      mem_limit_mb: 1024
      cpu_cores: 1.0
      data_fraction: 0.0
    - id: 2
      profile: "weak"
      mem_limit_mb: 512
      cpu_cores: 0.5
      data_fraction: 0.0

data:
  dataset: "cifar10"
  partition: "iid"
  dirichlet_alpha: 0.1
  reduced_fraction: 0.02   # 250 train samples/client → fast rounds
  eval_fraction: 0.02
  max_eval_samples_per_client: 20

quantization:
  mode: "fixed_fp32"
  fixed_bits: 32
  calibration_samples: 8

fl:
  local_epochs: 1
  batch_size: 2
  per_profile_batch:
    strong: 2
    medium: 2
    weak: 1
    extreme_weak: 1
  num_workers: 0
  pin_memory: false
  optimizer: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  min_clients_per_round: 1

rl:
  algorithm: "ppo"
  total_timesteps: 50
  n_steps: 1

logging:
  level: "info"
  metrics_dir: "outputs/metrics"
  plots_dir: "outputs/plots"
