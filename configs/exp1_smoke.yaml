# configs/exp1_smoke.yaml
# Phase 6 smoke test: 2 rounds, 3 strong clients, IID, FP32 only.
# Purpose: verify Flower server+clients run end-to-end and produce JSON logs.
# NOTE: use_32 is intentionally absent here.
#       The HARD GUARD in client.py enforces 224×224 by rejecting use_32=true.
#       This config uses the built-in paper-aligned 224×224 transforms.

experiment:
  name: "exp1_smoke"
  rounds: 2
  seed: 42
  dropout_mode: "stochastic"

clients:
  count: 3
  profiles:
    - id: 0
      profile: "strong"
      mem_limit_mb: 2048
      cpu_cores: 2.0
      data_fraction: 0.0   # auto-split
    - id: 1
      profile: "strong"
      mem_limit_mb: 2048
      cpu_cores: 2.0
      data_fraction: 0.0
    - id: 2
      profile: "strong"
      mem_limit_mb: 2048
      cpu_cores: 2.0
      data_fraction: 0.0

data:
  dataset: "cifar10"
  partition: "iid"
  dirichlet_alpha: 0.1
  reduced_fraction: 0.005  # ~250 train images total → ~83 per client (fast smoke)

quantization:
  mode: "fixed_fp32"
  fixed_bits: 32
  calibration_samples: 16

fl:
  local_epochs: 1
  batch_size: 2             # small batch → fits 224×224 on 3.8 GB RAM
  per_profile_batch:
    strong: 2
    medium: 2
    weak: 1
    extreme_weak: 1
  num_workers: 0            # VM-safe
  pin_memory: false
  optimizer: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  min_clients_per_round: 3

rl:
  algorithm: "ppo"
  total_timesteps: 2
  n_steps: 1

logging:
  level: "info"
  metrics_dir: "outputs/metrics"
  plots_dir: "outputs/plots"
