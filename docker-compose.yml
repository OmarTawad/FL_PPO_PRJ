name: fl_ppo_prj
services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server
    hostname: server
    environment:
      CONFIG_PATH: configs/exp_docker_50clients.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
      SERVER_PORT: '8080'
      OUTPUTS_DIR: /outputs
      NUM_ROUNDS: '50'
    ports:
    - 8080:8080
    volumes: &id001
    - ./data:/data:ro
    - ./outputs:/outputs
    - ./configs:/app/configs:ro
    networks: &id002
    - fl_network
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 12288m
        reservations:
          cpus: '4'
          memory: 4096m
    healthcheck:
      test:
      - CMD-SHELL
      - echo healthy
      interval: 10s
      timeout: 5s
      retries: 3
  client_00:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00
    environment:
      CLIENT_ID: '0'
      SERVER_ADDR: server:8080
      CONFIG_PATH: configs/exp_docker_50clients.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data
    volumes: *id001
    networks: *id002
    depends_on:
    - server
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048m
    restart: 'no'
  client_01:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
