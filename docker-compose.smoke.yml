# docker-compose.smoke.yml
# Stage 16 Smoke Test: 1 server + 3 clients (1 strong, 1 medium, 1 weak)
# Purpose: validate gRPC connectivity + shared data volume + JSON logging
# WITHOUT running all 50 clients (safe for 22 GB RAM host)
#
# Run:
#   docker compose -f docker-compose.smoke.yml up --build --abort-on-container-exit
#
# Expected outcome:
#   - Server logs: "Simulation complete" or "Server disconnected"
#   - outputs/metrics/run_*/round_001.json and round_002.json created
#   - All required JSON fields present (see SPEC.md §8)
#
# After run:
#   python3 scripts/plot_results.py outputs/metrics/run_<id>
#   python3 scripts/summarize_run.py outputs/metrics/run_<id>

name: fl_ppo_smoke

services:

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: fl_ppo_server:latest
    container_name: fl_server_smoke
    hostname: server
    environment:
      CONFIG_PATH: configs/exp_docker_smoke.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data/cifar10
      SERVER_PORT: "8080"
      OUTPUTS_DIR: /outputs
      NUM_ROUNDS: "2"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
      - ./outputs:/outputs
      - ./configs:/app/configs:ro
    networks:
      - fl_smoke_net
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: "12288m"
    # Server waits for all clients to register before starting rounds
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: "5s"
      timeout: "3s"
      retries: 5

  client_00:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_00_smoke
    environment:
      CLIENT_ID: "0"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_smoke.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data/cifar10
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_smoke_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2048m"
    restart: "no"

  client_01:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_01_smoke
    environment:
      CLIENT_ID: "1"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_smoke.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data/cifar10
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_smoke_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1024m"
    restart: "no"

  client_02:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    image: fl_ppo_client:latest
    container_name: fl_client_02_smoke
    environment:
      CLIENT_ID: "2"
      SERVER_ADDR: "server:8080"
      CONFIG_PATH: configs/exp_docker_smoke.yaml
      PARTITION_FILE: /data/partitions_50_iid.json
      DATA_ROOT: /data/cifar10
    volumes:
      - ./data:/data:ro
      - ./configs:/app/configs:ro
    networks:
      - fl_smoke_net
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512m"
    restart: "no"

networks:
  fl_smoke_net:
    driver: bridge
